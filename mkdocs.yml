site_name: Nostradamus IoTO SDK
site_description: Professional Python SDK for Nostradamus IoT Observatory API
site_url: https://nostradamus-ioto-sdk.readthedocs.io
repo_url: https://github.com/nostradamus/nostradamus-ioto-sdk
repo_name: nostradamus/nostradamus-ioto-sdk

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - Authentication: authentication.md
  - User Guide:
      - Organizations: guide/organizations.md
      - Projects: guide/projects.md
      - Collections: guide/collections.md
      - Data Operations: guide/data.md
      - Statistics: guide/statistics.md
  - Examples: examples.md
  - API Reference:
      - Client: api/client.md
      - Resources: api/resources.md
      - Models: api/models.md
      - Exceptions: api/exceptions.md
  - Contributing: contributing.md
  - Changelog: changelog.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            docstring_style: google
            merge_init_into_class: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/nostradamus/nostradamus-ioto-sdk
